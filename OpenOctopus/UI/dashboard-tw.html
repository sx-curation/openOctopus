<!DOCTYPE html>
<html class="light" lang="zh-TW">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>OpenOctopus | 台股分析儀表板</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#000f27",
          "performance-green": "#10AC84",
          "performance-red": "#EE5253",
          "surface-container-lowest": "#ffffff",
          "surface-container-low": "#f5f3f6",
          "surface-container-high": "#e9e7eb",
          "on-surface": "#1b1b1e",
          "on-surface-variant": "#44474e",
        },
        fontFamily: {
          headline: ["Manrope", "system-ui", "sans-serif"],
          body: ["Inter", "system-ui", "sans-serif"],
          label: ["Inter", "system-ui", "sans-serif"]
        }
      }
    }
  }
</script>
<style>
  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    font-size: 20px;
    line-height: 1;
    vertical-align: middle;
  }
  .nav-active {
    background: #ffffff;
    color: #000f27;
    font-weight: 700;
    border-radius: 0 0.5rem 0.5rem 0;
    box-shadow: 0 1px 4px rgba(0,15,39,0.08);
  }
  .tooltip-glass {
    background: rgba(48, 48, 51, 0.92);
    backdrop-filter: blur(20px);
  }
  .ambient-shadow { box-shadow: 0px 24px 48px rgba(11, 36, 71, 0.06); }
  * { transition-property: background-color, color, opacity, transform; transition-duration: 150ms; }
  .gauge-circle { transition: stroke-dashoffset 1.2s cubic-bezier(0.4, 0, 0.2, 1); }
  .page-section { display: none; }
  .page-section.active { display: block; }
  .construction {
    background: #fff3cd;
    border: 1px solid #ffc107;
    color: #856404;
    padding: 12px;
    border-radius: 8px;
    text-align: center;
    font-size: 12px;
  }
</style>
</head>
<body class="bg-surface font-body text-on-surface flex min-h-screen" style="background:#faf9fc;">

<!-- SIDEBAR -->
<aside class="fixed left-0 top-0 h-full flex flex-col py-6 z-50 w-60" style="background:#f5f3f6;">
  <div class="px-6 mb-10 flex items-center gap-3">
    <div class="w-9 h-9 rounded-lg flex items-center justify-center" style="background:linear-gradient(135deg,#000f27,#0b2447);">
      <span class="material-symbols-outlined fill-icon text-white" style="font-size:18px;">account_balance</span>
    </div>
    <div>
      <p class="font-headline font-bold text-primary leading-tight text-sm">台股分析</p>
      <p class="font-label text-[9px] uppercase tracking-widest text-slate-400">Taiwan Stocks</p>
    </div>
  </div>

  <nav class="flex-1 space-y-0.5 pr-4">
    <a href="/" class="nav-link flex items-center px-6 py-3 cursor-pointer">
      <span class="material-symbols-outlined mr-3 text-primary">home</span>
      <span class="font-label text-[11px] uppercase tracking-widest font-bold">返回首頁</span>
    </a>
    <a href="/dashboard/us" class="nav-link flex items-center px-6 py-3 text-slate-500 hover:bg-surface-container-high rounded-r-lg cursor-pointer">
      <span class="material-symbols-outlined mr-3">trending_up</span>
      <span class="font-label text-[11px] uppercase tracking-widest">美股儀表板</span>
    </a>
  </nav>
</aside>

<!-- MAIN CONTENT -->
<main class="ml-60 flex-1 flex flex-col min-w-0">
  <header class="flex justify-between items-center px-8 h-14 sticky top-0 z-40" style="background:#faf9fc; border-bottom:1px solid rgba(196,198,207,0.15);">
    <h1 class="text-base font-headline font-bold tracking-[0.15em] text-primary uppercase">台股分析平台</h1>
    <div class="flex items-center gap-4">
      <div class="relative">
        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" style="font-size:15px;">search</span>
        <input id="ticker-input" placeholder="輸入股票代碼 (例如: 2330)" class="pl-9 pr-4 py-1.5 bg-surface-container-high rounded text-xs focus:ring-0 border-none w-56 placeholder:text-slate-400 focus:bg-white focus:outline-1" type="text">
      </div>
      <button onclick="loadData()" class="px-4 py-1.5 bg-primary text-white rounded text-xs font-bold hover:opacity-90">載入</button>
    </div>
  </header>

  <div class="p-6 flex gap-6 min-h-0">
    <div class="flex-[3] space-y-6 min-w-0">

      <!-- Trinity Hero Section -->
      <section class="bg-surface-container-lowest rounded-lg p-6 ambient-shadow">
        <div class="flex justify-between items-start mb-8">
          <div>
            <p class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant mb-1">台股績效指標</p>
            <h2 class="font-headline text-2xl font-extrabold text-primary" id="dashboard-hero-title">—</h2>
            <p class="text-[10px] text-on-surface-variant mt-2" id="dashboard-active-ticker"></p>
            <div class="mt-2 text-[9px] text-on-surface-variant" id="dashboard-source-meta"></div>
          </div>
          <div class="text-right">
            <p class="font-label text-[9px] uppercase tracking-widest text-on-surface-variant mb-1">目前股價</p>
            <div class="flex items-center gap-1.5 justify-end">
              <span class="text-2xl font-headline font-bold tabular-nums text-primary" id="current-price">--</span>
              <span class="material-symbols-outlined fill-icon text-performance-green" style="font-size:22px;">trending_up</span>
            </div>
            <p class="text-[9px] text-on-surface-variant mt-1" id="price-change">--</p>
          </div>
        </div>

        <!-- Three Gauges -->
        <div class="grid grid-cols-3 gap-8">
          <!-- Gauge 1 -->
          <div class="flex flex-col items-center">
            <div class="relative w-28 h-28 flex items-center justify-center">
              <svg viewBox="0 0 128 128" class="w-full h-full -rotate-90">
                <circle cx="64" cy="64" r="56" fill="none" stroke="#e9e7eb" stroke-width="7"/>
                <circle cx="64" cy="64" r="56" fill="none" stroke="#000f27" stroke-width="7"
                  stroke-dasharray="351.86"
                  stroke-dashoffset="56.3"
                  stroke-linecap="round"
                  class="gauge-circle"/>
              </svg>
              <span class="absolute font-headline font-bold text-base tabular-nums text-primary">施工中</span>
            </div>
            <p class="mt-3 font-label text-[10px] uppercase tracking-widest font-bold text-center">本益比指標</p>
            <p class="text-[9px] text-on-surface-variant mt-0.5" id="gauge1-note">—</p>
          </div>

          <!-- Gauge 2 -->
          <div class="flex flex-col items-center">
            <div class="relative w-28 h-28 flex items-center justify-center">
              <svg viewBox="0 0 128 128" class="w-full h-full -rotate-90">
                <circle cx="64" cy="64" r="56" fill="none" stroke="#e9e7eb" stroke-width="7"/>
                <circle cx="64" cy="64" r="56" fill="none" stroke="#778cb5" stroke-width="7"
                  stroke-dasharray="351.86"
                  stroke-dashoffset="112.6"
                  stroke-linecap="round"
                  class="gauge-circle"/>
              </svg>
              <span class="absolute font-headline font-bold text-base tabular-nums text-primary">施工中</span>
            </div>
            <p class="mt-3 font-label text-[10px] uppercase tracking-widest font-bold text-center">股東權益報酬率</p>
            <p class="text-[9px] text-on-surface-variant mt-0.5" id="gauge2-note">—</p>
          </div>

          <!-- Gauge 3 -->
          <div class="flex flex-col items-center">
            <div class="relative w-28 h-28 flex items-center justify-center">
              <svg viewBox="0 0 128 128" class="w-full h-full -rotate-90">
                <circle cx="64" cy="64" r="56" fill="none" stroke="#e9e7eb" stroke-width="7"/>
                <circle cx="64" cy="64" r="56" fill="none" stroke="#10AC84" stroke-width="7"
                  stroke-dasharray="351.86"
                  stroke-dashoffset="28.15"
                  stroke-linecap="round"
                  class="gauge-circle"/>
              </svg>
              <span class="absolute font-headline font-bold text-base tabular-nums text-primary">施工中</span>
            </div>
            <p class="mt-3 font-label text-[10px] uppercase tracking-widest font-bold text-center">技術指標一致性</p>
            <p class="text-[9px] text-on-surface-variant mt-0.5" id="gauge3-note">—</p>
          </div>
        </div>

        <!-- Sparkline -->
        <div class="mt-8 pt-5" style="border-top:1px solid rgba(196,198,207,0.15);">
          <div class="construction">
            ⚙️ <strong>即將推出:</strong> 30天走勢圖表與技術指標分析
          </div>
        </div>
      </section>

      <!-- Financial Data Section -->
      <section class="bg-surface-container-lowest rounded-lg p-6 ambient-shadow">
        <h3 class="font-headline text-[11px] font-extrabold text-primary uppercase tracking-tight mb-6">財務指標</h3>

        <div class="grid grid-cols-3 gap-6">
          <!-- Price Data -->
          <div class="bg-surface-container-low rounded-lg p-4">
            <p class="font-label text-[9px] uppercase tracking-widest text-on-surface-variant mb-3">股價資訊</p>
            <div class="space-y-3 text-sm" id="price-data-section">
              <div class="flex justify-between">
                <span class="text-on-surface-variant">現價</span>
                <span class="font-bold" id="price-val">—</span>
              </div>
              <div class="flex justify-between">
                <span class="text-on-surface-variant">52週高</span>
                <span class="font-bold" id="high52-val">—</span>
              </div>
              <div class="flex justify-between">
                <span class="text-on-surface-variant">52週低</span>
                <span class="font-bold" id="low52-val">—</span>
              </div>
            </div>
          </div>

          <!-- Key Ratios -->
          <div class="bg-surface-container-low rounded-lg p-4">
            <p class="font-label text-[9px] uppercase tracking-widest text-on-surface-variant mb-3">關鍵比率</p>
            <div class="space-y-3 text-sm" id="ratios-section">
              <div class="flex justify-between">
                <span class="text-on-surface-variant">本益比</span>
                <span class="font-bold" id="pe-val">—</span>
              </div>
              <div class="flex justify-between">
                <span class="text-on-surface-variant">ROE</span>
                <span class="font-bold" id="roe-val">—</span>
              </div>
              <div class="flex justify-between">
                <span class="text-on-surface-variant">負債比</span>
                <span class="font-bold" id="debt-val">—</span>
              </div>
            </div>
          </div>

          <!-- Growth -->
          <div class="bg-surface-container-low rounded-lg p-4">
            <p class="font-label text-[9px] uppercase tracking-widest text-on-surface-variant mb-3">成長指標</p>
            <div class="space-y-3 text-sm" id="growth-section">
              <div class="flex justify-between">
                <span class="text-on-surface-variant">營收成長</span>
                <span class="font-bold" id="revenue-growth">—</span>
              </div>
              <div class="flex justify-between">
                <span class="text-on-surface-variant">殖利率</span>
                <span class="font-bold" id="dividend-yield">—</span>
              </div>
              <div class="flex justify-between">
                <span class="text-on-surface-variant">市值</span>
                <span class="font-bold" id="market-cap">—</span>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- News Section -->
      <section class="bg-surface-container-lowest rounded-lg p-6 ambient-shadow">
        <h3 class="font-headline text-[11px] font-extrabold text-primary uppercase tracking-tight mb-6">最新新聞</h3>
        <div id="news-section" class="space-y-4">
          <div class="construction">
            ⚙️ 載入中...
          </div>
        </div>
      </section>

    </div>

    <!-- Right Sidebar (empty for now) -->
    <div class="flex-[1] space-y-6 min-w-0 hidden"></div>
  </div>
</main>

<script>
  let currentTicker = '2330';

  async function loadData() {
    const ticker = document.getElementById('ticker-input').value.trim() || '2330';
    currentTicker = ticker;

    try {
      const response = await fetch(`/api/tw/dashboard/summary?ticker=${encodeURIComponent(ticker)}`);
      const data = await response.json();

      if (data.error) {
        document.getElementById('dashboard-hero-title').textContent = '錯誤';
        document.getElementById('dashboard-active-ticker').textContent = data.error;
        return;
      }

      renderTWData(data);
    } catch (error) {
      console.error('Error:', error);
      document.getElementById('dashboard-hero-title').textContent = '錯誤';
      document.getElementById('dashboard-active-ticker').textContent = error.message;
    }
  }

  function renderTWData(data) {
    const summary = data.summary || {};
    const priceData = summary.price_data || {};
    const financials = summary.financials || {};
    const technicals = summary.technicals || {};
    const news = summary.recent_news || [];

    // Hero section
    document.getElementById('dashboard-hero-title').textContent = financials.company_name || data.ticker || '—';
    document.getElementById('dashboard-active-ticker').textContent = `股票代碼: ${data.ticker}`;

    if (priceData.price) {
      document.getElementById('current-price').textContent = `NT$${priceData.price}`;
      const changeColor = priceData.change_pct >= 0 ? 'text-performance-green' : 'text-performance-red';
      const changeSymbol = priceData.change_pct >= 0 ? '+' : '';
      document.getElementById('price-change').innerHTML = `<span class="${changeColor}">${changeSymbol}${priceData.change_pct}% 今日漲跌</span>`;
    }

    // Price Data
    let priceHtml = `
      <div class="flex justify-between">
        <span class="text-on-surface-variant">現價</span>
        <span class="font-bold">NT$${priceData.price || '—'}</span>
      </div>
      <div class="flex justify-between">
        <span class="text-on-surface-variant">52週高</span>
        <span class="font-bold">NT$${priceData.week_52_high || '—'}</span>
      </div>
      <div class="flex justify-between">
        <span class="text-on-surface-variant">52週低</span>
        <span class="font-bold">NT$${priceData.week_52_low || '—'}</span>
      </div>
    `;
    document.getElementById('price-data-section').innerHTML = priceHtml;

    // Ratios
    let ratioHtml = `
      <div class="flex justify-between">
        <span class="text-on-surface-variant">本益比</span>
        <span class="font-bold">${(financials.pe_ratio_trailing || 0).toFixed(1)}</span>
      </div>
      <div class="flex justify-between">
        <span class="text-on-surface-variant">ROE</span>
        <span class="font-bold">${(financials.return_on_equity_pct || 0).toFixed(2)}%</span>
      </div>
      <div class="flex justify-between">
        <span class="text-on-surface-variant">負債比</span>
        <span class="font-bold">${(financials.debt_to_equity || 0).toFixed(2)}</span>
      </div>
    `;
    document.getElementById('ratios-section').innerHTML = ratioHtml;

    // Growth
    let growthHtml = `
      <div class="flex justify-between">
        <span class="text-on-surface-variant">營收成長</span>
        <span class="font-bold">${(financials.revenue_growth_yoy_pct || 0).toFixed(2)}%</span>
      </div>
      <div class="flex justify-between">
        <span class="text-on-surface-variant">殖利率</span>
        <span class="font-bold">${(financials.dividend_yield_pct || 0).toFixed(2)}%</span>
      </div>
      <div class="flex justify-between">
        <span class="text-on-surface-variant">市值</span>
        <span class="font-bold">NT$${(priceData.market_cap || 0) / 1e9} 十億</span>
      </div>
    `;
    document.getElementById('growth-section').innerHTML = growthHtml;

    // News
    if (news && news.length > 0) {
      let newsHtml = news.slice(0, 5).map(item =>
        `<div class="p-3 border border-gray-200 rounded hover:bg-gray-50">
          <p class="text-[9px] text-gray-500 mb-1">${item.date || '—'}</p>
          <a href="${item.url || '#'}" target="_blank" class="text-sm font-bold text-primary hover:underline">${item.title}</a>
        </div>`
      ).join('');
      document.getElementById('news-section').innerHTML = newsHtml;
    }
  }

  // Initialize
  document.getElementById('ticker-input').value = '2330';
  document.getElementById('ticker-input').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') loadData();
  });
  loadData();
</script>
</body>
</html>
